name: Test Supabase Handler

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm install dotenv node-fetch@3 --no-save

      - name: Run handler test
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          node -e 'require("dotenv").config({path:".env.local"}); (async()=>{ globalThis.fetch=(await import("node-fetch")).default; const h=require("./api/test-supabase.js"); const res={status:(s)=>({json:(j)=>console.log("STATUS",s,JSON.stringify(j))})}; try{ await h(null,res); }catch(e){ console.error("HANDLER ERR", e && e.stack?e.stack:e); } })()'
