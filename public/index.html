<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trading AI Tutor — Modules</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:32px;background:#f7fafc;color:#0f172a}
    .card{background:#fff;border-radius:8px;padding:16px;margin:12px 0;box-shadow:0 1px 3px rgba(2,6,23,.06)}
    h1{margin:0 0 12px;font-size:20px}
    ul{padding-left:18px;margin:8px 0}
    .status{color:#059669;font-weight:600}
    .error{color:#dc2626;font-weight:700}
  </style>
</head>
<body>
  <h1>Course Modules</h1>
  <div id="status" class="card">Loading modules…</div>
  <div id="list"></div>

  <script>
    async function load() {
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('list');
      try {
        const res = await fetch('/api/test-supabase');
        const json = await res.json();
        if (!json.ok) throw new Error(JSON.stringify(json));
        statusEl.textContent = 'Connected to Supabase — modules loaded';
        statusEl.className = 'card status';
        const rows = json.rows || [];
        if (rows.length === 0) {
          listEl.innerHTML = '<div class="card">No modules found.</div>';
          return;
        }
        listEl.innerHTML = rows.map(r => 
          `<div class="card"><strong>${escapeHtml(r.title)}</strong><div style="font-size:12px;color:#475569">ID: ${r.id}</div></div>`
        ).join('');
      } catch (err) {
        statusEl.textContent = 'Error loading modules';
        statusEl.className = 'card error';
        listEl.innerHTML = '<pre class="card">' + escapeHtml(String(err)) + '</pre>';
      }
    }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
    load();
  </script>
</body>
</html>
